  - type: web
    name: govtrack-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: govtrack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: govtrack-redis
          property: connectionString
      - key: PROJECT_NAME
        value: GovTrack AI
      - key: API_V1_STR
        value: /api/v1
      - key: SECRET_KEY
        generateValue: true

  - type: redis
    name: govtrack-redis
    ipAllowList: [] # Only allow internal connections
    plan: free
