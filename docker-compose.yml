services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: govtrack-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=govtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: govtrack-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
